{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UE Jesus Maria | Panel de Administración</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="{% static 'accounts/css/base_admin.css' %}">
</head>
<body>

    <aside class="sidebar">
        <div class="sidebar-header">
            <i class="fa-solid fa-building-columns"></i> UE Jesus Maria
        </div>
        <nav class="nav-menu">
            <a href="{% url 'dashboard' %}" class="nav-item active">
                <i class="fa-solid fa-chart-pie"></i> Panel Principal
            </a>
            <a href="#" class="nav-item">
                <i class="fa-solid fa-users"></i> Estudiantes (RF2)
            </a>
            <a href="#" class="nav-item">
                <i class="fa-solid fa-chalkboard"></i> Académico (RF4)
            </a>
            <a href="#" class="nav-item">
                <i class="fa-solid fa-file-signature"></i> Inscripciones (RF6)
            </a>
        </nav>
    </aside>

    <div class="main-wrapper">
        <header class="topbar">
            <div class="page-title">
                <h2>{% block page_title %}Dashboard{% endblock %}</h2>
            </div>
            <div class="user-info">
                <span><i class="fa-solid fa-user-circle"></i> Hola, {{ request.user.username }}</span>
                <form method="post" action="{% url 'logout' %}" style="display:inline;">
                    {% csrf_token %}
                    <button type="submit" style="background:none; border:none; cursor:pointer;" class="btn-logout">
                        <i class="fa-solid fa-right-from-bracket"></i> Salir
                    </button>
                </form>
            </div>
        </header>

        <main class="content-area">
            {% block content %}
            {% endblock %}
        </main>
    </div>

</body>
</html>
